name: 部署到 GitHub Pages

on:
  push:
    branches: [master]

# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 确保只有一个部署在运行
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 注入高德 Key
        run: |
          echo "// 高德地图 API Key" > config.js
          echo "var AMAP_KEY = '${{ secrets.AMAP_KEY }}';" >> config.js

      - name: 确认生成文件
        run: ls -la config.js && cat config.js

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
