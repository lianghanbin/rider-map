name: 部署到 GitHub Pages

on:
  push:
    branches: [master]

# peaceiris/actions-gh-pages 需要 contents: write 权限
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 注入高德 Key
        run: echo "var AMAP_KEY = '${{ secrets.AMAP_KEY }}';" > config.js

      - name: 确认 config.js 已生成
        run: cat config.js

      - name: 部署到 gh-pages 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: '.'
          publish_branch: gh-pages
          # 排除 .github 目录，不部署工作流文件
          exclude_assets: '.github/**,.gitignore,.git'
