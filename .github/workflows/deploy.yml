name: 部署到 GitHub Pages

on:
  push:
    branches: [master]

# 给工作流写入权限，才能部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 注入高德 Key
        run: echo "var AMAP_KEY = '${{ secrets.AMAP_KEY }}';" > config.js

      - name: 上传到 GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署
        id: deployment
        uses: actions/deploy-pages@v4
