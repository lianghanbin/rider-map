name: 部署到 GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: 生成 config.js（从 Secret 注入 Key）
        run: |
          if [ -n "$AMAP_KEY" ]; then
            echo "var AMAP_KEY = '$AMAP_KEY';" > config.js
          else
            cp config.example.js config.js 2>/dev/null || echo "var AMAP_KEY = '';" > config.js
          fi
        env:
          AMAP_KEY: ${{ secrets.AMAP_KEY }}

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
        id: deployment
