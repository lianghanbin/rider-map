name: 部署到 GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 生成 config.js
        run: |
          if [ -n "$AMAP_KEY" ]; then
            echo "var AMAP_KEY = '$AMAP_KEY';" > config.js
            echo "config.js 已从 Secret 生成"
          elif [ -f config.example.js ]; then
            cp config.example.js config.js
            echo "config.js 从模板复制（需手动填 Key）"
          else
            echo "var AMAP_KEY = '';" > config.js
            echo "警告：未设置 AMAP_KEY"
          fi
        env:
          AMAP_KEY: ${{ secrets.AMAP_KEY }}

      - name: 上传部署产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
