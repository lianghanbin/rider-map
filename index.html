    function showAndCopyShareCode() {
      if (!myNickname) return;
      var data = JSON.stringify({ n: myNickname, a: myAvatarUrl, m: markers, r: routes });
      var code = btoa(encodeURIComponent(data).replace(/%([0-9A-F]{2})/g,function(m,p){return String.fromCharCode('0x'+p)}));
      copyToClipboard(code);
      document.getElementById('share-result').style.display = 'block';
      setTimeout(function() { document.getElementById('share-result').style.display = 'none'; }, 2000);
    }

    function copyToClipboard(text) {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }

    function importFriend() {
      var code = document.getElementById('friend-code').value.trim();
      if (!code) return;
      try {
        var d = JSON.parse(decodeURIComponent(atob(code).split('').map(function(c){return '%'+c.charCodeAt(0).toString(16)}).join('')));
        if (!d.n || !d.m) return;
        friends[d.n] = code;
        if (d.a) friendAvatars[d.n] = d.a;
        if (d.r && d.r.length > 0) friendRoutes[d.n] = d.r;
        if (!friendColors[d.n]) {
          var used = Object.values(friendColors);
          var next = FRIEND_PALETTE.find(function(c) { return used.indexOf(c) === -1; }) || FRIEND_PALETTE[Object.keys(friendColors).length % FRIEND_PALETTE.length];
          friendColors[d.n] = next;
        }
        localStorage.setItem('rider-friends', JSON.stringify(friends));
        localStorage.setItem('rider-friend-avatars', JSON.stringify(friendAvatars));
        localStorage.setItem('rider-friend-colors', JSON.stringify(friendColors));
        friendMarks[d.n] = d.m;
        document.getElementById('friend-code').value = '';
        updateFriendUI();
        renderMapMarkers();
      } catch(e) {}
    }

    function removeFriend(name) {
      delete friends[name];
      localStorage.setItem('rider-friends', JSON.stringify(friends));
      delete friendMarks[name];
      selectedFriends.delete(name);
      updateFriendUI();
      renderMapMarkers();
    }

    // 好友列表事件委托
    var fl2 = document.getElementById('friend-list');
    if (fl2) fl2.addEventListener('click', function(e) {
      var delBtn = e.target.closest('.friend-del-btn');
      if (delBtn) { removeFriend(delBtn.getAttribute('data-friend')); return; }
      var dot = e.target.closest('.friend-color-dot');
      if (dot) { e.preventDefault(); cycleFriendColor(dot.getAttribute('data-friend')); return; }
      var row = e.target.closest('.friend-row');
      if (row) { toggleFriend(row.getAttribute('data-friend')); }
    });

    function updateFriendUI() {
      var fl = document.getElementById('friend-list');
      if (!fl) return;
      var names = Object.keys(friends);
      if (names.length === 0) { fl.innerHTML = '还没有好友笔记'; }
      else {
        fl.innerHTML = '';
        names.forEach(function(n) {
          var sel = selectedFriends.has(n);
          var fc = friendColors[n] || '#8e44ad';
          var fav = friendAvatars[n] ? '<img src=\"' + friendAvatars[n] + '\" style=\"width:20px;height:20px;border-radius:50%;object-fit:cover;vertical-align:middle;margin-right:4px;\">' : '';
          var d = document.createElement('div');
          d.className = 'friend-row';
          d.setAttribute('data-friend', n);
          d.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:4px 8px;border-radius:8px;margin-bottom:3px;cursor:pointer;' + (sel ? 'background:' + fc + ';color:white;font-weight:bold;' : 'background:#f5f5f5;');
          d.innerHTML = '<span class=\"friend-color-dot\" data-friend=\"' + n.replace(/"/g,'&quot;') + '\" style=\"display:inline-block;width:18px;height:18px;border-radius:50%;background:' + fc + ';cursor:pointer;border:2px solid white;flex-shrink:0;\" title=\"点击换颜色\"></span>'
            + '<span style=\"flex:1;display:flex;align-items:center;gap:4px;font-size:12px;\">' + fav + n + '</span>'
            + '<button class=\"friend-del-btn\" data-friend=\"' + n.replace(/"/g,'&quot;') + '\" style=\"background:none;border:none;color:' + (sel ? 'rgba(255,255,255,0.8)' : '#e74c3c') + ';cursor:pointer;font-size:13px;padding:4px 8px;\">✕</button>';
          fl.appendChild(d);
        });
      }
    }
    function cycleFriendColor(name) {
      var cur = friendColors[name] || '#8e44ad';
      var idx = FRIEND_PALETTE.indexOf(cur);
      var next = FRIEND_PALETTE[(idx + 1) % FRIEND_PALETTE.length];
      friendColors[name] = next;
      localStorage.setItem('rider-friend-colors', JSON.stringify(friendColors));
      updateFriendUI();
      renderMapMarkers();
    }
    function _adoptFriendMarker(friendName, fi) {
      var fm = (friendMarks[friendName] || [])[fi];
      if (!fm) return -1;
      var m = { lat: fm.lat, lng: fm.lng, tags: fm.tags || ['未分类'], note: fm.note || '', locationName: fm.locationName || '', time: Date.now() };
      markers.push(m);
      saveMarkers();
      return markers.length - 1;
    }

    function adoptAndConnect(friendName, fi) {
      var idx = _adoptFriendMarker(friendName, fi);
      if (idx >= 0) connectFromPopup(idx);
    }

    function adoptAndEdit(friendName, fi) {
      var idx = _adoptFriendMarker(friendName, fi);
      if (idx >= 0) setTimeout(function() { editMarker(idx); }, 100);
    }

    function adoptAndDelete(friendName, fi) {
      var fms = friendMarks[friendName];
      if (!fms || !fms[fi]) return;
      fms.splice(fi, 1);
      // 同步更新friends存储
      var code = friends[friendName];
      try {
        var d = JSON.parse(decodeURIComponent(atob(code).split('').map(function(c){return '%'+c.charCodeAt(0).toString(16)}).join('')));
        d.m = fms;
        var newCode = btoa(encodeURIComponent(JSON.stringify(d)).replace(/%([0-9A-F]{2})/g,function(m,p){return String.fromCharCode('0x'+p)}));
        friends[friendName] = newCode;
        localStorage.setItem('rider-friends', JSON.stringify(friends));
      } catch(e) {}
      renderMapMarkers();
      renderMarkerList();
    }

    function viewFriendRoute(fn, routeId) {
      var fr = (friendRoutes[fn] || []).find(function(r) { return r.id === routeId; });
      if (!fr) return;
      clearRouteLines();
      var fms2 = friendMarks[fn] || [];
      var stops = (fr.stops || []).map(function(i) { return fms2[i]; }).filter(Boolean);
      if (stops.length < 2) return;
      var lats = stops.map(function(m) { return [m.lat, m.lng]; });
      map.fitBounds(L.latLngBounds(lats), { padding: [50, 50] });

      var segColors = ['#2196F3','#e74c3c','#27ae60','#f39c12','#8e44ad','#00bcd4'];
      var segCount = stops.length - 1;
      var segDists = new Array(segCount).fill(null);

      // 图例
      var legend = L.control({ position: 'bottomleft' });
      legend.onAdd = function() {
        var d = L.DomUtil.create('div', '');
        d.id = 'route-legend';
        d.innerHTML = '<div style="background:white;padding:6px 10px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.1);font-size:11px;line-height:1.8;min-width:120px;position:relative;"><button onclick="event.stopPropagation();clearRouteLines()" style="position:absolute;top:2px;right:4px;background:none;border:none;cursor:pointer;font-size:14px;color:#999;">×</button>'
          + '<b>好友: ' + escapeHtml(fn) + '</b><br>' + buildLegendHtml(segDists, segColors, null, fn, fr.id) + '</div>';
        return d;
      };
      legend.addTo(map);
      _routeLegend = legend;

      function updateLegend() {
        var el = document.getElementById('route-legend');
        if (el) el.innerHTML = '<div style="background:white;padding:6px 10px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.1);font-size:11px;line-height:1.8;min-width:120px;position:relative;"><button onclick="event.stopPropagation();clearRouteLines()" style="position:absolute;top:2px;right:4px;background:none;border:none;cursor:pointer;font-size:14px;color:#999;">×</button>'
          + '<b>好友: ' + escapeHtml(fn) + '</b><br>' + buildLegendHtml(segDists, segColors, null, fn, fr.id) + '</div>';
      }

      var totalWalkDist = 0, doneCount = 0;
      for (var i = 0; i < segCount; i++) {
        var a = stops[i], b = stops[i + 1];
        if (!a || !b) { doneCount++; continue; }
        var sc = segColors[i % segColors.length];

        // 虚线
        _connectLines.push(L.polyline([[a.lat, a.lng], [b.lat, b.lng]], { color: sc, weight: 2, dashArray: '8 6', opacity: 0.6 }).addTo(map));

        // 箭头
        var dLa = b.lat - a.lat, dLn = b.lng - a.lng;
        var segLen = Math.sqrt(dLa * dLa + dLn * dLn);
        if (segLen > 0.0001) {
          var pLa = -dLn / segLen, pLn = dLa / segLen, hs = 0.0005;
          [0.3, 0.7].forEach(function(t) {
            var cx = a.lat + dLa * t, cy = a.lng + dLn * t;
            var tip = [cx + dLa / segLen * hs, cy + dLn / segLen * hs];
            var left = [cx - dLa / segLen * hs * 0.3 + pLa * hs * 0.7, cy - dLn / segLen * hs * 0.3 + pLn * hs * 0.7];
            var right = [cx - dLa / segLen * hs * 0.3 - pLa * hs * 0.7, cy - dLn / segLen * hs * 0.3 - pLn * hs * 0.7];
            _connectLines.push(L.polyline([left, tip, right], { color: sc, weight: 2.5, opacity: 0.8 }).addTo(map));
          });
        }

        // 步行路径
        (function(idx, from, to, color) {
          fetchWalkRoute(from.lat, from.lng, to.lat, to.lng, function(result) {
            doneCount++;
            if (result && result.points.length > 0) {
              totalWalkDist += result.distance;
              segDists[idx] = result.distance;
              updateLegend();
              _connectLines.push(L.polyline(result.points, { color: color, weight: 4, opacity: 0.8 }).addTo(map));
            } else {
              segDists[idx] = 0;
              updateLegend();
            }
          });
        })(i, a, b, sc);
      }
      if (window.innerWidth <= 600) closeSidebar();
    }

    function toggleFriend(name) {
      if (selectedFriends.has(name)) selectedFriends.delete(name);
      else selectedFriends.add(name);
      updateFriendUI();
      renderMapMarkers();
      renderMarkerList();
    }

    function loadAllFriendMarks() {
      Object.keys(friends).forEach(function(n) {
        try {
          var d = JSON.parse(decodeURIComponent(atob(friends[n]).split('').map(function(c){return '%'+c.charCodeAt(0).toString(16)}).join('')));
          friendMarks[n] = d.m || [];
          if (d.r && d.r.length > 0) friendRoutes[n] = d.r;
        } catch(e) {}
      });
      updateFriendUI();
    }

    // 在 renderMapMarkers 之后画选中的好友标记（紫色钉）
    var hideOwnMarkers = false;
    function toggleHideOwn() {
      hideOwnMarkers = !hideOwnMarkers;
      var btn = document.getElementById('hide-own-btn');
      if (btn) btn.textContent = hideOwnMarkers ? '显示' : '隐藏';
      renderMapMarkers();
      renderMarkerList();
    }
    var origRMM2 = renderMapMarkers;
    renderMapMarkers = function() {
      origRMM2();
      if (hideOwnMarkers) {
        map.eachLayer(function(l) {
          if (l instanceof L.Marker && (!l.options || l.options.zIndexOffset !== 50)) {
            try { map.removeLayer(l); } catch(e) {}
          }
        });
      }
      selectedFriends.forEach(function(name) {
        if (!friendMarks[name]) return;
        var fc = friendColors[name] || '#8e44ad';
        friendMarks[name].forEach(function(fm, fi) {
          var fIcon = L.divIcon({
            html: '<div style=\"background:' + fc + ';width:22px;height:22px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.35);\"><div style=\"background:white;width:6px;height:6px;border-radius:50%;position:relative;top:6px;left:6px;\"></div></div>',
            className: '', iconSize: [28,28], iconAnchor: [14,30], popupAnchor: [0,-32]
          });
          L.marker([fm.lat, fm.lng], { icon: fIcon, zIndexOffset: 50 }).addTo(map)
            .bindPopup('<div style=min-width:180px><b>好友: ' + name + '</b><div style=\"margin:4px 0\">' + ((fm.tags||['未分类']).map(function(t){return '<span style=\"display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;margin-right:3px;background:#f3e5f5;color:#7b1fa2;\">'+escapeHtml(t)+'</span>';}).join('')) + '</div><p style=margin-top:4px;color:#333;font-size:12px>' + (fm.note||'') + '</p><small style=color:#999>' + (fm.locationName||'') + '</small><br>'
            + '<button onclick=\"adoptAndConnect(\'' + name + '\',' + fi + ');map.closePopup();\" style=\"margin-top:6px;padding:4px 8px;background:#2196F3;color:white;border:none;border-radius:3px;cursor:pointer;font-size:11px;margin-right:2px;\">🔗 连线</button>'
            + '<button onclick=\"adoptAndEdit(\'' + name + '\',' + fi + ');map.closePopup();\" style=\"margin-top:6px;padding:4px 8px;background:#f39c12;color:white;border:none;border-radius:3px;cursor:pointer;font-size:11px;margin-right:2px;\">✏️ 编辑</button>'
            + '<button onclick=\"adoptAndDelete(\'' + name + '\',' + fi + ');map.closePopup();\" style=\"margin-top:6px;padding:4px 8px;background:#e74c3c;color:white;border:none;border-radius:3px;cursor:pointer;font-size:11px;\">🗑 删除</button>'
            + '</div>');
        });
      });
    };

    loadAllFriendMarks();
    updateFriendUI();
    updateProfileUI();
    // ====== 好友分享系统结束 ======
  </script>

</body>
</html>
